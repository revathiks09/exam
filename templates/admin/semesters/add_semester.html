{% extends 'admin/admin_layout.html' %}
{% load static %}

{% block title %}Add Semester - ExamEase{% endblock %}

{% block content %}
<main>
    <div class="container-fluid px-4">
        <h1 class="mt-4">Add New Semester</h1>
        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item"><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'semesters' %}">Semesters</a></li>
            <li class="breadcrumb-item active">Add Semester</li>
        </ol>

        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-calendar-alt"></i> Semester Information</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{% url 'save_semester' %}">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="course_id" class="form-label">Course <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="course_id" name="course_id" required>
                                    <option value="">Select Course</option>
                                    {% for course in courses %}
                                    <option value="{{ course.id }}">{{ course.course_name }} - {{ course.dept.dept_name}}
                                       
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="semester_no" class="form-label">Semester Number <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="semester_no" name="semester_no" required>
                                    <option value="">Select Semester</option>
                                    {% for i in "12345678"|make_list %}
                                    <option value="{{ i }}">Semester {{ i }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'semesters' %}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Save Semester
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
