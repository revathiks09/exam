{% extends 'student/student_layout.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Apply for Revaluation</h4>

                <form class="forms-sample" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Select Subject</label>
                        <select name="subject" class="form-control" required>
                            <option value="">-- Select Subject --</option>
                            {% for sub in subjects %}
                            <option value="{{ sub.id }}">{{ sub.subject_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Reason for Revaluation</label>
                        <textarea class="form-control" name="reason" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary me-2">Submit Request</button>
                    <a href="{% url 'student_dashboard' %}" class="btn btn-light">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
