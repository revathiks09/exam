{% extends 'student/student_layout.html' %}

{% block content %}
<div class="row">
    <div class="col-lg-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">My Hall Tickets</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Semester</th>
                                <th>Issued Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for ht in hall_tickets %}
                            <tr>
                                <td>Semester {{ ht.semester.semester_no }}</td>
                                <td>{{ ht.issued_date }}</td>
                                <td>
                                    <a href="{% url 'view_hall_ticket_detail' ht.id %}" target="_blank"
                                        class="btn btn-primary btn-sm">
                                        <i class="icon-printer"></i> Print / Download
                                    </a>
                                </td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="3" class="text-center">No hall tickets issued yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
