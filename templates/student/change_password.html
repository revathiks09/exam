{% extends 'student/student_layout.html' %}
{% load static %}

{% block title %}Change Password - ExamEase{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Change Password</h4>
                <p class="card-description">Update your account password</p>

                <form class="forms-sample" method="POST" action="{% url 'update_pass_student' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="inputOldPassword">Old Password</label>
                        <input type="password" class="form-control" id="inputOldPassword" name="old_password"
                            placeholder="Old Password" required>
                    </div>
                    <div class="form-group">
                        <label for="inputNewPassword">New Password</label>
                        <input type="password" class="form-control" id="inputNewPassword" name="new_password"
                            placeholder="New Password" required>
                    </div>
                    <div class="form-group">
                        <label for="inputConfirmPassword">Confirm New Password</label>
                        <input type="password" class="form-control" id="inputConfirmPassword" name="confirm_password"
                            placeholder="Confirm New Password" required>
                    </div>

                    <button type="submit" class="btn btn-primary me-2">Update Password</button>
                    <a href="{% url 'student_dashboard' %}" class="btn btn-light">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.querySelector('form').addEventListener('submit', function (e) {
        const newPassword = document.getElementById('inputNewPassword').value;
        const confirmPassword = document.getElementById('inputConfirmPassword').value;

        if (newPassword !== confirmPassword) {
            e.preventDefault();
            alert('New password and confirm password do not match!');
            return false;
        }

        if (newPassword.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters long!');
            return false;
        }
    });
</script>
{% endblock %}
