{% extends 'faculty/faculty_layout.html' %}

{% block content %}
<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Edit Question Paper</h4>
                <p class="card-description"> Update question paper details </p>
                <form class="forms-sample" method="POST" action="{% url 'update_question_paper' %}"
                    enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="qp_id" value="{{ qpaper.id }}">

                    <div class="form-group">
                        <label for="paper_title">Paper Title</label>
                        <input type="text" class="form-control" id="paper_title" name="paper_title" required
                            value="{{ qpaper.paper_title|default:'' }}">
                    </div>

                    <div class="form-group">
                        <label for="subject">Select Subject</label>
                        <select class="form-control" id="subject" name="subject" required>
                            <option value="">-- Select Subject --</option>
                            {% for sub in subjects %}
                            <option value="{{ sub.id }}" {% if sub.id==qpaper.subject_id %}selected{% endif %}>{{
                                sub.subject_name }} ({{ sub.subject_code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="semester">Select Semester</label>
                        <select class="form-control" id="semester" name="semester" required>
                            <option value="">-- Select Semester --</option>
                            {% for sem in semesters %}
                            <option value="{{ sem.id }}" {% if sem.id==qpaper.semester_id %}selected{% endif %}>
                                {{ sem.course.course_name }} - Semester {{ sem.semester_no }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Current File</label>
                        {% if qpaper.file_path %}
                        <div class="input-group">
                            <input type="text" class="form-control" disabled value="{{ qpaper.file_path }}">
                            <div class="input-group-append">
                                <a href="{{ qpaper.file_path }}" target="_blank" class="btn btn-info">View</a>
                            </div>
                        </div>
                        {% else %}
                        <p class="text-muted">No file uploaded</p>
                        {% endif %}
                    </div>

                    <div class="form-group">
                        <label>Upload New File (Optional)</label>
                        <input type="file" name="qp_file" class="file-upload-default">
                        <div class="input-group col-xs-12">
                            <input type="text" class="form-control file-upload-info" disabled
                                placeholder="Upload New File">
                            <span class="input-group-append">
                                <button class="file-upload-browse btn btn-primary" type="button">Upload</button>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary me-2">Update</button>
                    <a href="{% url 'view_question_papers' %}" class="btn btn-light">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
