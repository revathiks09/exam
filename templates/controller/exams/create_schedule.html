{% extends 'controller/controller_layout.html' %}

{% block title %}Create Exam Schedule - ExamEase{% endblock %}

{% block content %}
<div class="page-header">
    <h3 class="page-title">
        <span class="page-title-icon bg-gradient-primary text-white me-2">
            <i class="icon-calendar"></i>
        </span> Create Exam Schedule
    </h3>
    <nav aria-label="breadcrumb">
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'controller_dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Create Schedule</li>
        </ul>
    </nav>
</div>

<div class="row">
    <div class="col-md-8 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Exam Schedule Form</h4>
                <form method="POST" action="{% url 'save_exam_schedule' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="subject_id">Subject *</label>
                        <select class="form-control" id="subject_id" name="subject_id" required>
                            <option value="">Select Subject</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.subject_name }} (Semester {{
                                subject.semester.semester_no }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="exam_date">Exam Date *</label>
                        <input type="date" class="form-control" id="exam_date" name="exam_date" required>
                    </div>
                    <div class="form-group">
                        <label for="start_time">Start Time *</label>
                        <input type="time" class="form-control" id="start_time" name="start_time" required>
                    </div>
                    <div class="form-group">
                        <label for="end_time">End Time *</label>
                        <input type="time" class="form-control" id="end_time" name="end_time" required>
                    </div>
                    <button type="submit" class="btn btn-primary mr-2">
                        <i class="icon-check"></i> Create Schedule
                    </button>
                    <a href="{% url 'exam_timetable' %}" class="btn btn-light">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
